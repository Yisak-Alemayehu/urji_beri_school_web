<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1E3A8A">
    <title>Offline - Urji Beri Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 16% 18%, rgba(30, 58, 138, 0.08), transparent 24rem),
                radial-gradient(circle at 84% 20%, rgba(16, 185, 129, 0.1), transparent 24rem),
                linear-gradient(135deg, #ffffff 0%, #F8FAFC 100%);
            padding: 20px;
        }
        .offline-container { text-align: center; max-width: 400px; }
        .offline-icon { width: 80px; height: 80px; margin: 0 auto 24px; color: #1E3A8A; }
        h1 { color: #111827; margin-bottom: 12px; font-size: 24px; }
        p { color: #475569; line-height: 1.6; margin-bottom: 24px; }
        button {
            background: #1E3A8A;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #2563EB; }
    </style>
</head>
<body>
    <div class="offline-container">
        <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="1" y1="1" x2="23" y2="23"></line>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
            <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
        <h1>You're Offline</h1>
        <p>Please check your internet connection and try again.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
